server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    root /var/www/verdix-app/dist;
    index index.html;

    access_log /var/log/nginx/verdix-app.access.log;
    error_log /var/log/nginx/verdix-app.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
