<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">IoT and MQTT Environmental Monitoring</title>
  <desc id="desc">Industrial sensors, PLC gateway, MQTT broker, and environmental dashboard for real-time monitoring.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4fbf7"/>
      <stop offset="0.58" stop-color="#e6f6ee"/>
      <stop offset="1" stop-color="#d9efe5"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fbf9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#163529" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#2d6a4f" stroke-width="2">
