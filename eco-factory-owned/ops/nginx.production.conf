server {
  listen 80;
  server_name app.verdixgreen.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name app.verdixgreen.com;

  ssl_certificate /etc/letsencrypt/live/app.verdixgreen.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.verdixgreen.com/privkey.pem;

  root /usr/share/nginx/html;
  index index.html;
  charset utf-8;
  charset_types text/html text/css application/javascript application/json text/plain;

  client_max_body_size 30m;

  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /healthz {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
