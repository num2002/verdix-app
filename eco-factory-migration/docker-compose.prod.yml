version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: eco_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: eco_factory
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eco_user -d eco_factory"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${CI_REGISTRY_IMAGE}/backend:${APP_VERSION:-latest}
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: eco_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: eco_factory
      APP_PORT: 8080
      UPLOAD_DIR: /app/uploads
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      RESEND_API_KEY: ${RESEND_API_KEY}
      APP_BASE_URL: ${APP_BASE_URL}
      FROM_EMAIL: ${FROM_EMAIL}
      EMAIL_VERIFICATION_ENABLED: ${EMAIL_VERIFICATION_ENABLED:-true}
      ADMIN_APPROVAL_REQUIRED: ${ADMIN_APPROVAL_REQUIRED:-false}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-false}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: ${CI_REGISTRY_IMAGE}/frontend:${APP_VERSION:-latest}
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
